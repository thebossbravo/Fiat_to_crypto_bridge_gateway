<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol 101.1</title>
        <style>
            .main {
                border: 1px solid white;
                border-radius: 2%;
                padding: 60px;
                margin: 3px;
            }
        h2, h3 {
            text-align: center;
            color: white;
            }
        body {
            color: white;
            font-weight: bold;
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 5px auto;
            padding: 20px;
            background-image: url('assets/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f4f4f4; /* fallback */
        }
        .form-group1, .form-group2, .form-group3, .form-group4, .form-group5, .form-group6, .form-group7, .form-group8 {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 2px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .error {
            color: red;
            font-size: 12px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            cursor: pointer;
            width: 75%;
            margin: 5px 0;
            font-weight: bold;
            border-radius: 5%;
            border: 1px 75%;
        }
        button:hover {
            background-color: #45a049;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-group3, .form-group4 {
            flex: 1;
        }

    </style>
</head>
<body>
    <div class="main">
    <h2>Protokol 101.1</h2>
    <p>Enter details below to process transaction:</p>
    <form id="creditCardForm">
        <div class="form-group1">
            <label for="cardName">Cardholder Name</label>
            <input type="text" id="cardName" name="cardName" required>
            <div class="error" id="nameError"></div>
        </div>
        <div class="form-group2">
            <label for="cardNumber">Card Number</label>
            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
            <div class="error" id="numberError"></div>
        </div>
        <div class="form-row">
            <div class="form-group3">
                <label for="expiryDate">Expiration Date</label>
                <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
                <div class="error" id="expiryError"></div>
            </div>
            <div class="form-group4">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4">
                <div class="error" id="cvvError"></div>
            </div>
        </div>

        <div class="form-group8">
            <label for="depositAmount">Deposit Amount (Fiat)</label>
            <input type="number" id="depositAmount" name="depositAmount" min="0" step="any" placeholder="100" required>
            <label for="depositCurrency">Deposit Currency</label>
            <select id="depositCurrency" name="depositCurrency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>
            <div class="error" id="depositError"></div>
        </div>

        <div class="form-group9">
            <label for="approvalCode">Approval Code</label>
            <input type="text" id="approvalCode" name="approvalCode" placeholder="Enter approval code" maxlength="4" required>
            <div class="error" id="approvalError"></div>
        </div>

        <button type="button" id="depositBtn">Deposit Fiat</button>

        <div class="form-group6">
            <h3>Fiat to Crypto Conversion</h3>
            <label for="fiatAmount">Amount</label>
            <input type="number" id="fiatAmount" name="fiatAmount" min="0" step="any" placeholder="100">

            <label for="fiatCurrency">Fiat currency</label>
            <select id="fiatCurrency" name="fiatCurrency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>

            <label for="cryptoCurrency">Convert to crypto</label>
            <select id="cryptoCurrency" name="cryptoCurrency">
                <option value="usdt">Tether (USDT)</option>
            </select>

            <p id="conversionResult">Enter amount and choose currencies to see conversion.</p>
            <button type="button" id="convertBtn">Convert</button>
        </div>

        <div class="form-group7">
            <h3>Fiat Deposit + Balance</h3>
            <p id="fiatIngressDisplay">Fiat ingressed: 0</p>
            <p id="fiatBalanceDisplay">Fiat balance: 0</p>
            <p id="cryptoBalanceDisplay">Crypto balances: USDT 0</p>
        </div>

         <div class="form-group5">
            <label for="walletAddress">Crypto Wallet Address</label>
            <input type="text" id="walletAddress" name="walletAddress" placeholder="e.g., 0x123... or bc1..." required>
            <div class="error" id="walletError"></div>
        </div>

        <button type="submit">Send Crypto</button>
    </form>
    </div>

    <script>
        let fiatIngressTotal = 0;
        let fiatBalance = 0;
        let currentFiatCurrency = 'USD';
        const cryptoBalances = { usdt: 0 };

        function renderBalances() {
            const fiatIngressDisplay = document.getElementById('fiatIngressDisplay');
            const fiatBalanceDisplay = document.getElementById('fiatBalanceDisplay');
            const cryptoBalanceDisplay = document.getElementById('cryptoBalanceDisplay');

            fiatIngressDisplay.textContent = `Fiat ingressed: ${fiatIngressTotal.toFixed(2)} ${currentFiatCurrency}`;
            fiatBalanceDisplay.textContent = `Fiat balance: ${fiatBalance.toFixed(2)} ${currentFiatCurrency}`;
            cryptoBalanceDisplay.textContent = `Crypto balances: USDT ${cryptoBalances.usdt.toFixed(6)}`;
        }

        document.getElementById('creditCardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (validateForm()) {
                const depositAmount = parseFloat(document.getElementById('depositAmount').value);
                const depositCurrency = document.getElementById('depositCurrency').value;

                if (!isNaN(depositAmount) && depositAmount > 0) {
                    fiatIngressTotal += depositAmount;
                    fiatBalance += depositAmount;
                    currentFiatCurrency = depositCurrency;
                }

                renderBalances();
                alert('Payment submitted successfully! Fiat amount ingressed and balance updated.');
                // Here you would typically send the data to your server
            }
        });

        document.getElementById('depositBtn').addEventListener('click', function() {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.textContent = '');

            // Validate name
            const name = document.getElementById('cardName').value.trim();
            if (name === '') {
                document.getElementById('nameError').textContent = 'Name is required';
                isValid = false;
            }

            // Validate card number
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            if (!isValidCardNumber(cardNumber)) {
                document.getElementById('numberError').textContent = 'Invalid card number';
                isValid = false;
            }

            // Validate expiry date
            const expiry = document.getElementById('expiryDate').value;
            if (!isValidExpiry(expiry)) {
                document.getElementById('expiryError').textContent = 'Invalid expiry date';
                isValid = false;
            }

            // Validate CVV
            const cvv = document.getElementById('cvv').value;
            if (!isValidCVV(cvv)) {
                document.getElementById('cvvError').textContent = 'Invalid CVV';
                isValid = false;
            }

            // Validate deposit amount
            const depositAmount = parseFloat(document.getElementById('depositAmount').value);
            if (isNaN(depositAmount) || depositAmount <= 0) {
                document.getElementById('depositError').textContent = 'Please enter a positive deposit amount';
                isValid = false;
            }

            // Validate approval code against card and deposit details
            const approvalCode = document.getElementById('approvalCode').value.trim();
            const depositCurrency = document.getElementById('depositCurrency').value;
            if (!isValidApprovalCode(approvalCode, cardNumber, expiry, cvv, depositAmount, depositCurrency)) {
                document.getElementById('approvalError').textContent = 'Invalid approval code for these card details and deposit amount';
                isValid = false;
            }

            if (isValid) {
                fiatIngressTotal += depositAmount;
                fiatBalance += depositAmount;
                currentFiatCurrency = depositCurrency;
                renderBalances();
                alert('Fiat deposited successfully! Balance updated.');
            }
        });

        function validateForm() {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.textContent = '');

            // Validate name
            const name = document.getElementById('cardName').value.trim();
            if (name === '') {
                document.getElementById('nameError').textContent = 'Name is required';
                isValid = false;
            }

            // Validate card number
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            if (!isValidCardNumber(cardNumber)) {
                document.getElementById('numberError').textContent = 'Invalid card number';
                isValid = false;
            }

            // Validate expiry date
            const expiry = document.getElementById('expiryDate').value;
            if (!isValidExpiry(expiry)) {
                document.getElementById('expiryError').textContent = 'Invalid expiry date';
                isValid = false;
            }

            // Validate CVV
            const cvv = document.getElementById('cvv').value;
            if (!isValidCVV(cvv)) {
                document.getElementById('cvvError').textContent = 'Invalid CVV';
                isValid = false;
            }

            // Validate wallet address
            const wallet = document.getElementById('walletAddress').value.trim();
            if (wallet === '') {
                document.getElementById('walletError').textContent = 'Wallet address is required';
                isValid = false;
            }

            // Validate deposit amount
            const depositAmount = parseFloat(document.getElementById('depositAmount').value);
            if (isNaN(depositAmount) || depositAmount <= 0) {
                document.getElementById('depositError').textContent = 'Please enter a positive deposit amount';
                isValid = false;
            }

            // Validate approval code against card and deposit details
            const approvalCode = document.getElementById('approvalCode').value.trim();
            const depositCurrency = document.getElementById('depositCurrency').value;
            if (!isValidApprovalCode(approvalCode, cardNumber, expiry, cvv, depositAmount, depositCurrency)) {
                document.getElementById('approvalError').textContent = 'Invalid approval code for these card details and deposit amount';
                isValid = false;
            }

            return isValid;
        }

        function isValidCardNumber(number) {
            // Remove spaces and check if all digits
            if (!/^\d+$/.test(number)) return false;

            // Check length (13-19 digits for most cards)
            if (number.length < 13 || number.length > 19) return false;

            // Luhn algorithm
            let sum = 0;
            let shouldDouble = false;
            for (let i = number.length - 1; i >= 0; i--) {
                let digit = parseInt(number.charAt(i));
                if (shouldDouble) {
                    digit *= 2;
                    if (digit > 9) digit -= 9;
                }
                sum += digit;
                shouldDouble = !shouldDouble;
            }
            return sum % 10 === 0;
        }

        function isValidExpiry(expiry) {
            const match = expiry.match(/^(\d{2})\/(\d{2})$/);
            if (!match) return false;

            const month = parseInt(match[1]);
            const year = parseInt('20' + match[2]);

            if (month < 1 || month > 12) return false;

            const now = new Date();
            const expiryDate = new Date(year, month - 1);
            return expiryDate > now;
        }

        function isValidCVV(cvv) {
            return /^\d{3,4}$/.test(cvv);
        }

        function getExpectedApprovalCode(cardNumber, expiry, cvv, depositAmount, depositCurrency) {
            const normalizedCard = (cardNumber || '').replace(/\s/g, '');
            if (!normalizedCard || !expiry || !cvv || isNaN(depositAmount) || depositAmount <= 0) {
                return null;
            }

            const rawString = `${normalizedCard}|${expiry}|${cvv}|${depositAmount.toFixed(2)}|${depositCurrency}`;
            let sum = 0;
            for (let i = 0; i < rawString.length; i++) {
                sum += rawString.charCodeAt(i);
            }

            return (sum % 10000).toString().padStart(4, '0');
        }

        function isValidApprovalCode(approvalCode, cardNumber, expiry, cvv, depositAmount, depositCurrency) {
            const expected = getExpectedApprovalCode(cardNumber, expiry, cvv, depositAmount, depositCurrency);
            return expected && approvalCode === expected;
        }

        // Format card number input
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
            value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
            e.target.value = value;
        });

        // Format expiry date input
        document.getElementById('expiryDate').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            e.target.value = value;
        });

        const conversionRates = {
            USD: { usdt: 1 },
            EUR: { usdt: 1.06 }
        };

        function updateConversion() {
            const amount = parseFloat(document.getElementById('fiatAmount').value);
            const fiat = document.getElementById('fiatCurrency').value;
            const crypto = document.getElementById('cryptoCurrency').value;
            const output = document.getElementById('conversionResult');

            if (isNaN(amount) || amount <= 0) {
                output.textContent = 'Please enter a positive fiat amount.';
                return;
            }

            if (amount > fiatBalance) {
                output.textContent = 'Insufficient fiat balance. Please deposit first via card details form.';
                return;
            }

            const rate = conversionRates[fiat] && conversionRates[fiat][crypto];
            if (!rate) {
                output.textContent = 'Rate unavailable for selected currencies.';
                return;
            }

            const converted = amount * rate;
            const symbol = crypto === 'usdc' ? 'USDC' : crypto === 'usdt' ? 'USDT' : crypto.toUpperCase();

            fiatBalance -= amount;
            cryptoBalances[crypto] += converted;
            currentFiatCurrency = fiat;
            renderBalances();

            output.textContent = `${amount.toFixed(2)} ${fiat} converted to ${converted.toFixed(6)} ${symbol}.`;
        }

        document.getElementById('convertBtn').addEventListener('click', updateConversion);
        document.getElementById('fiatCurrency').addEventListener('change', updateConversion);
        document.getElementById('cryptoCurrency').addEventListener('change', updateConversion);

        renderBalances();
    </script>
</body>
</html>
