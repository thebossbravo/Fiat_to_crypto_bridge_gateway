<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protokol 888</title>
        <style>
        body {
            color: white;
            font-weight: bold;
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-image: url('assets/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f4f4f4; /* fallback */
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .error {
            color: red;
            font-size: 12px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h2>Card Payment Form</h2>
    <form id="creditCardForm">
        <div class="form-group">
            <label for="cardName">Cardholder Name</label>
            <input type="text" id="cardName" name="cardName" required>
            <div class="error" id="nameError"></div>
        </div>
        <div class="form-group">
            <label for="cardNumber">Card Number</label>
            <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" required>
            <div class="error" id="numberError"></div>
        </div>
        <div class="form-group">
            <label for="expiryDate">Expiration Date</label>
            <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
            <div class="error" id="expiryError"></div>
        </div>
        <div class="form-group">
            <label for="cvv">CVV</label>
            <input type="text" id="cvv" name="cvv" placeholder="123" required>
            <div class="error" id="cvvError"></div>
        </div>
        <div class="form-group">
            <label for="walletAddress">Crypto Wallet Address</label>
            <input type="text" id="walletAddress" name="walletAddress" placeholder="e.g., 0x123... or bc1..." required>
            <div class="error" id="walletError"></div>
        </div>
        <button type="submit">Submit Payment</button>
    </form>

    <script>
        document.getElementById('creditCardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (validateForm()) {
                alert('Payment submitted successfully!');
                // Here you would typically send the data to your server
            }
        });

        function validateForm() {
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.textContent = '');

            // Validate name
            const name = document.getElementById('cardName').value.trim();
            if (name === '') {
                document.getElementById('nameError').textContent = 'Name is required';
                isValid = false;
            }

            // Validate card number
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            if (!isValidCardNumber(cardNumber)) {
                document.getElementById('numberError').textContent = 'Invalid card number';
                isValid = false;
            }

            // Validate expiry date
            const expiry = document.getElementById('expiryDate').value;
            if (!isValidExpiry(expiry)) {
                document.getElementById('expiryError').textContent = 'Invalid expiry date';
                isValid = false;
            }

            // Validate CVV
            const cvv = document.getElementById('cvv').value;
            if (!isValidCVV(cvv)) {
                document.getElementById('cvvError').textContent = 'Invalid CVV';
                isValid = false;
            }

            // Validate wallet address
            const wallet = document.getElementById('walletAddress').value.trim();
            if (wallet === '') {
                document.getElementById('walletError').textContent = 'Wallet address is required';
                isValid = false;
            }

            return isValid;
        }

        function isValidCardNumber(number) {
            // Remove spaces and check if all digits
            if (!/^\d+$/.test(number)) return false;

            // Check length (13-19 digits for most cards)
            if (number.length < 13 || number.length > 19) return false;

            // Luhn algorithm
            let sum = 0;
            let shouldDouble = false;
            for (let i = number.length - 1; i >= 0; i--) {
                let digit = parseInt(number.charAt(i));
                if (shouldDouble) {
                    digit *= 2;
                    if (digit > 9) digit -= 9;
                }
                sum += digit;
                shouldDouble = !shouldDouble;
            }
            return sum % 10 === 0;
        }

        function isValidExpiry(expiry) {
            const match = expiry.match(/^(\d{2})\/(\d{2})$/);
            if (!match) return false;

            const month = parseInt(match[1]);
            const year = parseInt('20' + match[2]);

            if (month < 1 || month > 12) return false;

            const now = new Date();
            const expiryDate = new Date(year, month - 1);
            return expiryDate > now;
        }

        function isValidCVV(cvv) {
            return /^\d{3,4}$/.test(cvv);
        }

        // Format card number input
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
            value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
            e.target.value = value;
        });

        // Format expiry date input
        document.getElementById('expiryDate').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.slice(0, 2) + '/' + value.slice(2, 4);
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
